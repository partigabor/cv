baseURL = "https://partigabor.github.io/cv"
title = "CV"
theme = "almeida-cv"
disableKinds = ["page", "section", "taxonomy", "term", "RSS", "sitemap"]
languageCode = "en-us"
publishDir = "docs"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

[params] # and colors
enableMetaTags = true
colorLight = "#ffffff" # main paper
colorDark = "#242424" # main text
colorPageBackground = "#242424" # page bg
colorPrimary = "#8f1329" # last name
colorSecondary = "#242424" # first name
colorIconPrimary = "#ffffff" # icon text
colorIconBackground = "#8f1329" # icon color
colorRightColumnBackground = "#fafafa"
colorRightColumnHeadingText = "#484848"
colorRightColumnBodyText = "#484848"
colorRightColumnIconPrimary = "#ffffff"
colorRightColumnIconBackground = "#8f1329" 
pages = 1

# https://github.com/ineesalmeida/almeida-cv